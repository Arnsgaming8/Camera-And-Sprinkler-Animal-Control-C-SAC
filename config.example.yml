# === Option A: OLD format (Blink + B-hyve only) ===
bhyve_email: your-email@example.com
bhyve_password: your-bhyve-password
blink_email: your-email@example.com
blink_password: your-blink-password
device_id: "607220244f0c161d5a0d1648"
duration_seconds: 180
poll_interval_seconds: 30
cameras:
  - name: "Back yard"
    zone: 1
    duration_seconds: 180
    arm: true
    no_water: false
render_api_key: ""

