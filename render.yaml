services:
  - type: web
    name: camera-sprinkler-bridge
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: BLINK_EMAIL
        sync: false
      - key: BLINK_PASSWORD
        sync: false
      - key: BHYVE_EMAIL
        sync: false
      - key: BHYVE_PASSWORD
        sync: false
      - key: DEVICE_ID
        sync: false
      - key: CAMERAS
        sync: false
      - key: POLL_INTERVAL_SECONDS
        value: "30"
      - key: RENDER_API_KEY
        sync: false
